AWSTemplateFormatVersion: '2010-09-09'
Description: Load Testing Environment using Locust (Compatible with ALB App)

Parameters:
  TargetEndpoint:
    Type: String
    Description: ALB DNS from main stack
    Default: http://example-alb-dns.amazonaws.com

  Slaves:
    Type: Number
    Default: 5

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-00dc79254d0461090

Resources:

# ---------------- VPC ---------------- #
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.100.0.0/16

  IGW:
    Type: AWS::EC2::InternetGateway

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

# ---------------- SUBNETS ---------------- #
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.100.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.100.2.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs '']

# ---------------- ROUTING ---------------- #
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  AssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref RouteTable

  AssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref RouteTable

# ---------------- SECURITY ---------------- #
  LocustSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Locust SG
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5557
          ToPort: 5557
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5558
          ToPort: 5558
          CidrIp: 0.0.0.0/0

# ---------------- LOCUST MASTER ---------------- #
  LocustMaster:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      InstanceType: t3.medium
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref LocustSG
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install python3 git -y

          pip3 install locust

          cat > locustfile.py <<EOF
          from locust import HttpUser, task, between

          class WebsiteUser(HttpUser):
              wait_time = between(1, 3)

              @task
              def load_home(self):
                  self.client.get("/")
          EOF

          nohup locust -f locustfile.py \
          --master \
          --host=${TargetEndpoint} \
          --web-port 80 &

# ---------------- LOCUST SLAVES ---------------- #
  LocustLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
        InstanceType: t3.micro
        SecurityGroupIds:
          - !Ref LocustSG
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install python3 -y

            pip3 install locust

            cat > locustfile.py <<EOF
            from locust import HttpUser, task, between

            class WebsiteUser(HttpUser):
                wait_time = between(1, 3)

                @task
                def load_home(self):
                    self.client.get("/")
            EOF

            nohup locust -f locustfile.py \
            --worker \
            --master-host=${LocustMaster.PrivateIp} &

  LocustASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      MinSize: 1
      MaxSize: !Ref Slaves
      DesiredCapacity: !Ref Slaves
      LaunchTemplate:
        LaunchTemplateId: !Ref LocustLaunchTemplate
        Version: !GetAtt LocustLaunchTemplate.LatestVersionNumber

# ---------------- OUTPUT ---------------- #
Outputs:
  LocustURL:
    Description: Access Locust UI
    Value: !Sub "http://${LocustMaster.PublicDnsName}"